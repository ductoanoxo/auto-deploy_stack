version: "3.9"

services:
  backend:
    build: ./backend
    image: ${DOCKER_HUB_USER}/backend:${TAG:-latest}
    ports:
      - "8000:8000"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    env_file:
      - .env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OTEL_SERVICE_NAME=backend-service
    user: root
    networks:
      - stack_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure

  frontend:
    build: ./frontend
    image: ${DOCKER_HUB_USER}/frontend:${TAG:-latest}
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - stack_network
    deploy:
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure

  alloy:
    image: grafana/alloy:latest
    configs:
      - source: alloy_config
        target: /etc/alloy/config.alloy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host/root:ro,rslave
    command: [
      "run",
      "/etc/alloy/config.alloy"
    ]
    environment:
      - GRAFANA_PROMETHEUS_URL=${GRAFANA_PROMETHEUS_URL}
      - GRAFANA_PROMETHEUS_USER=${GRAFANA_PROMETHEUS_USER}
      - GRAFANA_LOKI_URL=${GRAFANA_LOKI_URL}
      - GRAFANA_LOKI_USER=${GRAFANA_LOKI_USER}
      - GRAFANA_TEMPO_URL=${GRAFANA_TEMPO_URL}
      - GRAFANA_TEMPO_USER=${GRAFANA_TEMPO_USER}
      - GRAFANA_CLOUD_TOKEN=${GRAFANA_CLOUD_TOKEN}
      - NODE_NAME={{.Node.Hostname}}
    ports:
      - "4317:4317" # gRPC Tracing
      - "4318:4318" # HTTP Tracing
    networks:
      - stack_network
    deploy:
      mode: global
      resources:
        limits:
          memory: 384M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    networks:
      - stack_network
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    deploy:
      mode: global
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  swarm-exporter:
    image: digitalocean/prometheus-swarm-exporter:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - stack_network
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

configs:
  alloy_config:
    name: alloy_config_v${TAG:-1}
    external: true

networks:
  stack_network:
    driver: overlay
