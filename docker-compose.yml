version: "3.9"

services:
  backend:
    build: ./backend
    image: ${DOCKER_HUB_USER}/backend:${TAG:-latest}
    ports:
      - "8000:8000"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    env_file:
      - .env
    user: root
    networks:
      - stack_network
    deploy:
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 60s

  frontend:
    build: ./frontend
    image: ${DOCKER_HUB_USER}/frontend:${TAG:-latest}
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - stack_network
    deploy:
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure

networks:
  stack_network:
    driver: overlay
