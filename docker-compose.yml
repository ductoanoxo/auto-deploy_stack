version: "3.9"

services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    volumes:
      - "./backend:/app"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    group_add:
      - "999"
    env_file:
      - .env
    restart: always

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
