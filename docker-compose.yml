version: "3.9"

services:
  backend:
    build: ./backend
    image: ${DOCKER_HUB_USER}/backend:${TAG:-latest}
    ports:
      - "8000:8000"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    env_file:
      - .env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OTEL_SERVICE_NAME=backend-service
    user: root
    networks:
      - stack_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure

  frontend:
    build: ./frontend
    image: ${DOCKER_HUB_USER}/frontend:${TAG:-latest}
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - stack_network
    deploy:
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure

  alloy:
    image: grafana/alloy:latest
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host/root:ro,rslave
    command: [
      "run",
      "--allow-loading-from-ports",
      "/etc/alloy/config.alloy"
    ]
    environment:
      - GRAFANA_PROMETHEUS_URL=${GRAFANA_PROMETHEUS_URL}
      - GRAFANA_PROMETHEUS_USER=${GRAFANA_PROMETHEUS_USER}
      - GRAFANA_LOKI_URL=${GRAFANA_LOKI_URL}
      - GRAFANA_LOKI_USER=${GRAFANA_LOKI_USER}
      - GRAFANA_TEMPO_URL=${GRAFANA_TEMPO_URL}
      - GRAFANA_TEMPO_USER=${GRAFANA_TEMPO_USER}
      - GRAFANA_CLOUD_TOKEN=${GRAFANA_CLOUD_TOKEN}
    ports:
      - "4317:4317" # gRPC Tracing
      - "4318:4318" # HTTP Tracing
    networks:
      - stack_network
    deploy:
      mode: global
      resources:
        limits:
          memory: 384M

networks:
  stack_network:
    driver: overlay
